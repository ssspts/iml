<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IML Movie Finder</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>🎬 IML Movie Finder</h1>

<div class="search-bar">

<input id="search" placeholder="🎬 Movie name">

<input id="actorSearch" placeholder="👤 Actor name">

<input id="yearSearch" placeholder="📅 Year">

<select id="countryFilter">
<option value="">🌍 Country</option>
<option value="IN">India</option>
<option value="US">USA</option>
<option value="GB">UK</option>
<option value="KR">Korea</option>
<option value="JP">Japan</option>
<option value="FR">France</option>
</select>

<select id="genreFilter">
<option value="">🎭 Genre</option>
<option value="28">Action</option>
<option value="35">Comedy</option>
<option value="18">Drama</option>
<option value="27">Horror</option>
<option value="10749">Romance</option>
<option value="53">Thriller</option>
<option value="16">Animation</option>
<option value="99">Documentary</option>
</select>
<select id="languageFilter">

<option value="">🗣 Language</option>
<option value="hi">Hindi</option>
<option value="en">English</option>
<option value="ta">Tamil</option>
<option value="te">Telugu</option>
<option value="ko">Korean</option>
<option value="ja">Japanese</option>
<option value="fr">French</option>

</select>

    <select id="ottFilter">
        <option value="">🎥 OTT Platform</option>
        <option value="8">Netflix</option>
        <option value="337">Disney+</option>
        <option value="2">Apple TV+</option>
    </select>
<span id="resultCount"></span>

</div>

<div id="movies" class="container"></div>

<div class="pagination">

<button id="prev">⬅ Previous</button>

<span class="pageBox">
Page
<input id="pageInput" value="1">
/
<span id="totalPages">1</span>
</span>

<button id="next">Next ➡</button>

</div>
<div id="movieModal" class="modal">

<div class="modal-content">

<span id="closeModal">&times;</span>

<div id="modalBody"></div>

</div>

</div>
<script src="script.js"></script>

</body>
</html>
