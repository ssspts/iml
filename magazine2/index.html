<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IML - Movie & News Magazine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

</head>
<body>
<!-- Header -->

    <h1>IML Magazine</h1>


<!-- Main content -->
<main>
    <div class="magazine-container">
        <div class="page page-left" id="leftPage">
            <div class="page-number" id="leftPageNumber"></div>
        </div>
        <div class="page page-right" id="rightPage">
            <div class="page-number" id="rightPageNumber"></div>
        </div>
    </div>
</main>

<!-- Pagination -->
<div class="pagination">
    <button onclick="prev()">&#8592; Prev</button>
    <button onclick="next()">Next &#8594;</button>
</div>

<!-- Footer -->
<footer>
    &copy; 2026 IML Magazine
</footer>

<script src="script.js"></script>
</body>
</html>
